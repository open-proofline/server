services:
  server:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      SAFE_PRIVATE_BIND_ADDRS: 0.0.0.0:8080
      SAFE_PUBLIC_BIND_ADDRS: 0.0.0.0:8081
      SAFE_AUTH_BOOTSTRAP_SECRET: ${PROOFLINE_SMOKE_BOOTSTRAP_SECRET:-replace-with-local-compose-bootstrap-secret}
      SAFE_DATA_DIR: /data
      SAFE_DB_PATH: /data/safety.db
      SAFE_METADATA_BACKEND: postgresql
      SAFE_POSTGRES_DSN: postgres://proofline:proofline@postgres:5432/proofline?sslmode=disable
      SAFE_BLOB_BACKEND: s3
      SAFE_S3_ENDPOINT: http://minio:9000
      SAFE_S3_REGION: us-east-1
      SAFE_S3_BUCKET: proofline-evidence
      SAFE_S3_PREFIX: smoke/full
      SAFE_S3_ACCESS_KEY_ID: proofline
      SAFE_S3_SECRET_ACCESS_KEY: proofline-minio-password
      SAFE_S3_FORCE_PATH_STYLE: "true"
      SAFE_COORDINATION_BACKEND: valkey
      SAFE_VALKEY_ADDR: valkey:6379
    ports:
      - "127.0.0.1:${PROOFLINE_PRIVATE_PORT:-18080}:8080"
      - "127.0.0.1:${PROOFLINE_PUBLIC_PORT:-18081}:8081"
    volumes:
      - server-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: proofline
      POSTGRES_USER: proofline
      POSTGRES_PASSWORD: proofline
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proofline -d proofline"]
      interval: 2s
      timeout: 5s
      retries: 30

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: proofline
      MINIO_ROOT_PASSWORD: proofline-minio-password
    volumes:
      - minio-data:/data

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: proofline
      MINIO_ROOT_PASSWORD: proofline-minio-password
      MINIO_BUCKET: proofline-evidence
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        until mc alias set proofline http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 1
        done
        mc mb --ignore-existing "proofline/$${MINIO_BUCKET}"

  valkey:
    image: valkey/valkey:9-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  server-data:
  postgres-data:
  minio-data:
