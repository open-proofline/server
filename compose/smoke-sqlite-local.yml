services:
  server:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      SAFE_PRIVATE_BIND_ADDRS: 0.0.0.0:8080
      SAFE_PUBLIC_BIND_ADDRS: 0.0.0.0:8081
      SAFE_DATA_DIR: /data
      SAFE_DB_PATH: /data/safety.db
      SAFE_METADATA_BACKEND: sqlite
      SAFE_BLOB_BACKEND: local
      SAFE_COORDINATION_BACKEND: none
    ports:
      - "${PROOFLINE_PRIVATE_PORT:-18080}:8080"
      - "${PROOFLINE_PUBLIC_PORT:-18081}:8081"
    volumes:
      - server-data:/data

volumes:
  server-data:
