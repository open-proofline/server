services:
  server:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      SAFE_MAIN_BIND_ADDRS: 0.0.0.0:8080
      SAFE_ADMIN_BIND_ADDRS: 0.0.0.0:8081
      SAFE_AUTH_BOOTSTRAP_SECRET: ${PROOFLINE_SMOKE_BOOTSTRAP_SECRET:-replace-with-local-compose-bootstrap-secret}
      SAFE_DATA_DIR: /data
      SAFE_DB_PATH: /data/safety.db
      SAFE_METADATA_BACKEND: sqlite
      SAFE_BLOB_BACKEND: local
      SAFE_COORDINATION_BACKEND: none
    ports:
      - "127.0.0.1:${PROOFLINE_MAIN_PORT:-18080}:8080"
      - "127.0.0.1:${PROOFLINE_ADMIN_PORT:-18081}:8081"
    volumes:
      - server-data:/data

volumes:
  server-data:
