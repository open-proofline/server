services:
  server:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      SAFE_MAIN_BIND_ADDRS: 0.0.0.0:8080
      SAFE_ADMIN_BIND_ADDRS: 0.0.0.0:8081
      SAFE_AUTH_BOOTSTRAP_SECRET: ${PROOFLINE_SMOKE_BOOTSTRAP_SECRET:-replace-with-local-compose-bootstrap-secret}
      SAFE_DATA_DIR: /data
      SAFE_DB_PATH: /data/safety.db
      SAFE_METADATA_BACKEND: sqlite
      SAFE_BLOB_BACKEND: s3
      SAFE_S3_ENDPOINT: http://minio:9000
      SAFE_S3_REGION: us-east-1
      SAFE_S3_BUCKET: proofline-evidence
      SAFE_S3_PREFIX: smoke/sqlite-s3
      SAFE_S3_ACCESS_KEY_ID: proofline
      SAFE_S3_SECRET_ACCESS_KEY: proofline-minio-password
      SAFE_S3_FORCE_PATH_STYLE: "true"
      SAFE_COORDINATION_BACKEND: none
    ports:
      - "127.0.0.1:${PROOFLINE_MAIN_PORT:-18080}:8080"
      - "127.0.0.1:${PROOFLINE_ADMIN_PORT:-18081}:8081"
    volumes:
      - server-data:/data
    depends_on:
      minio-init:
        condition: service_completed_successfully

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: proofline
      MINIO_ROOT_PASSWORD: proofline-minio-password
    volumes:
      - minio-data:/data

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: proofline
      MINIO_ROOT_PASSWORD: proofline-minio-password
      MINIO_BUCKET: proofline-evidence
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        until mc alias set proofline http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 1
        done
        mc mb --ignore-existing "proofline/$${MINIO_BUCKET}"

volumes:
  server-data:
  minio-data:
