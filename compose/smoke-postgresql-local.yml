services:
  server:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      SAFE_PRIVATE_BIND_ADDRS: 0.0.0.0:8080
      SAFE_PUBLIC_BIND_ADDRS: 0.0.0.0:8081
      SAFE_DATA_DIR: /data
      SAFE_DB_PATH: /data/safety.db
      SAFE_METADATA_BACKEND: postgresql
      SAFE_POSTGRES_DSN: postgres://proofline:proofline@postgres:5432/proofline?sslmode=disable
      SAFE_BLOB_BACKEND: local
      SAFE_COORDINATION_BACKEND: none
    ports:
      - "${PROOFLINE_PRIVATE_PORT:-18080}:8080"
      - "${PROOFLINE_PUBLIC_PORT:-18081}:8081"
    volumes:
      - server-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: proofline
      POSTGRES_USER: proofline
      POSTGRES_PASSWORD: proofline
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proofline -d proofline"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  server-data:
  postgres-data:
