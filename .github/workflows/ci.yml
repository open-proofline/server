name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Summarize coverage
        run: |
          {
            echo "### Go coverage"
            echo '```text'
            go tool cover -func=coverage.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: go-coverage
          path: server/coverage.out
          if-no-files-found: error

  govulncheck:
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...

  build-binary:
    name: Build Linux binary
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: server
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build binary
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/safety-recorder-linux-amd64 ./cmd/api

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: safety-recorder-linux-amd64
          path: server/dist/safety-recorder-linux-amd64
          if-no-files-found: error

  attest-binary:
    name: Attest Linux binary
    runs-on: ubuntu-latest
    needs:
      - build-binary
      - govulncheck
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: safety-recorder-linux-amd64
          path: dist

      - name: Generate binary artifact attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: dist/safety-recorder-linux-amd64

  upload-release-binary:
    name: Upload release binary
    runs-on: ubuntu-latest
    needs: attest-binary
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: safety-recorder-linux-amd64
          path: dist

      - name: Create release if missing and upload binary
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          prerelease_args=()
          if [[ "$TAG_NAME" == *"-rc."* || "$TAG_NAME" == *"-rc"* || "$TAG_NAME" == *"-alpha"* || "$TAG_NAME" == *"-beta"* ]]; then
            prerelease_args+=(--prerelease --latest=false)
          fi

          if ! gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --repo "$REPO" \
              --verify-tag \
              --title "$TAG_NAME" \
              --notes "Automated release shell for $TAG_NAME. Maintainers should review and replace these notes before relying on this release." \
              "${prerelease_args[@]}"
          fi

          gh release upload "$TAG_NAME" dist/safety-recorder-linux-amd64 --repo "$REPO"

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Normalize Docker image name
        id: image-name
        run: |
          image_name="$(printf '%s' "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          echo "value=$image_name" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ steps.image-name.outputs.value }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs:
      - test
      - govulncheck
      - docker
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Normalize Docker image name
        id: image-name
        run: |
          image_name="$(printf '%s' "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          echo "value=$image_name" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ steps.image-name.outputs.value }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        id: build-and-publish
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Docker image attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-name: ${{ steps.image-name.outputs.value }}
          subject-digest: ${{ steps.build-and-publish.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
